<style>
  /* Định dạng chung cho vùng chứa Mindmap */
  .mindmap-container {
    max-width: 600px;
    margin: 0 auto;
    color: #f3f4f6;
  }
  
  .mm-header {
    text-align: center;
    margin-bottom: 20px;
  }
  
  .mm-title {
    font-size: 1.4rem;
    font-weight: bold;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  
  .mm-subtitle {
    color: #9ca3af;
    font-size: 0.85rem;
  }

  /* Hệ thống nút bấm bộ lọc (Tabs) */
  .tabs-wrapper {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
    justify-content: center;
  }

  .tab {
    background: #1f2937;
    color: #9ca3af;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    border: 1px solid #374151;
    transition: all 0.2s ease;
  }

  .tab:hover {
    background: #374151;
    color: #fff;
  }

  .tab.on {
    background: #2563eb;
    color: #fff;
    border-color: #3b82f6;
    font-weight: bold;
  }

  /* Cấu trúc danh sách các thẻ bài học (Grid & Cards) */
  #grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.2s ease;
  }

  /* Thanh tiêu đề của từng câu hỏi */
  .card .hd {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    gap: 12px;
    user-select: none;
    background: var(--ac-dim, #1f2937);
  }

  .card .hd:hover {
    background: var(--ac-dim2, #374151);
  }

  .card .num {
    background: var(--ac, #2563eb);
    color: #fff;
    min-width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: bold;
  }

  .card .ttl {
    flex: 1;
    font-size: 0.95rem;
    font-weight: bold;
    color: #fff;
    text-transform: uppercase;
  }

  .card .tg {
    background: #1f2937;
    color: #9ca3af;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 0.75rem;
    border: 1px solid #374151;
  }

  .card .arr {
    color: #6b7280;
    font-size: 0.8rem;
    transition: transform 0.2s ease;
  }

  /* Phần nội dung chi tiết ẩn/hiển thị bên trong */
  .card .bd {
    display: none;
    padding: 16px;
    border-top: 1px solid #1f2937;
    font-size: 0.9rem;
    line-height: 1.6;
    background: #0b0f19;
  }

  /* Trạng thái khi kích hoạt mở thẻ bài học */
  .card.on .bd {
    display: block;
  }

  .card.on .arr {
    transform: rotate(180deg);
  }

  /* Trạng thái ẩn thẻ khi bị bộ lọc loại bỏ */
  .card.hidden {
    display: none !important;
  }

  /* Định dạng nội dung học tập chi tiết phía trong bài học */
  .card .bd ul {
    margin: 0;
    padding-left: 20px;
  }
  
  .card .bd li {
    margin-bottom: 8px;
    color: #d1d5db;
  }

  .card .bd strong {
    color: #fff;
  }
</style>

<div class="mindmap-container">
  <div class="mm-header">
    <div class="mm-title">🧠 TÂM LÝ HỌC — MINDMAP ĐẦY ĐỦ</div>
    <div class="mm-subtitle">26 câu · Chi tiết toàn bộ nội dung · Click thẻ để mở rộng</div>
  </div>

  <div class="tabs-wrapper">
    <div class="tab on" data-f="all">Tất cả (26)</div>
    <div class="tab" data-f="tlxh">👨‍👩‍👧‍👦 Tâm lý XH</div>
    <div class="tab" data-f="bctl">🔬 Bản chất TL</div>
    <div class="tab" data-f="nt">💡 Nhận thức</div>
    <div class="tab" data-f="tcyc">❤️ Tình cảm & Ý chí</div>
    <div class="tab" data-f="nc">🌟 Nhân cách</div>
  </div>

  <div id="grid">
    <div style="text-align: center; padding: 40px; color: #6b7280;">
      🔄 Đang nạp danh sách sơ đồ tư duy...
    </div>
  </div>
</div>
