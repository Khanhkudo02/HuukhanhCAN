<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nguyễn Hữu Khánh</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

header{
    background:#1e293b;
    padding:15px 20px;
    display:flex;
    align-items:center;
}

.menu-btn{
    font-size:30px;
    cursor:pointer;
    margin-right:15px;
}

.sidebar{
    position:fixed;
    left:-300px;
    top:0;
    width:300px;
    height:100%;
    background:#020617;
    transition:0.3s;
    overflow-y:auto;
    z-index:1000;
}

.sidebar.active{
    left:0;
}

.sidebar-header{
    padding:20px;
    text-align:center;
    border-bottom:1px solid #334155;
}

.close-btn{
    float:right;
    cursor:pointer;
    font-size:28px;
}

#subjectList{
    list-style:none;
}

#subjectList li{
    padding:15px 20px;
    border-bottom:1px solid #1e293b;
}

#subjectList li:hover{
    background:#1e293b;
}

.main{
    padding:50px 20px;
}

.card{
    max-width:900px;
    margin:auto;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

.card h1{
    margin-bottom:15px;
}

.card p{
    line-height:1.8;
    color:#cbd5e1;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
}

</style>
</head>

<body>

<header>
    <span class="menu-btn" onclick="openSidebar()">☰</span>
    <h2>HuuKhanhCAN</h2>
</header>

<div class="sidebar" id="sidebar">

    <div class="sidebar-header">
        <span class="close-btn" onclick="closeSidebar()">×</span>
        <h2>Môn học</h2>
    </div>

    <ul id="subjectList"></ul>

</div>

<div class="main">

    <div class="card">

        <h1>Xin chào, tôi là Hữu Khánh</h1>

        <p>
            Đây là website cá nhân của tôi.
            Tại đây tôi lưu trữ thông tin học tập.
        </p>

    </div>

</div>

<footer>
     Nguyễn Hữu Khánh
</footer>

<script src="sidebar.js"></script>

<script>

function openSidebar(){
    document.getElementById("sidebar").classList.add("active");
}

function closeSidebar(){
    document.getElementById("sidebar").classList.remove("active");
}

renderSubjects();

</script>

</body>
</html>
